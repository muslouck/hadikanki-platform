<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PROJE MUSLUK | ASKERİ SERÜVEN</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --blue: #00f3ff; --pink: #ff00ff; --green: #39ff14; --gold: #ffcc00; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .game-board { background: #0a0f19; border: 2px solid var(--blue); padding: 20px; border-radius: 15px; width: 95%; max-width: 800px; text-align: center; }
        .rank-header { margin-bottom: 10px; padding: 8px; border: 1px solid var(--gold); border-radius: 10px; background: rgba(255, 204, 0, 0.05); }
        #rank-name { font-size: 1.8rem; color: var(--gold); text-shadow: 0 0 10px var(--gold); }
        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .column { display: flex; flex-direction: column; gap: 8px; }
        .card { padding: 12px; background: #111; border: 1px solid #333; border-radius: 6px; cursor: pointer; font-size: 1.1rem; text-transform: uppercase; transition: 0.1s; min-height: 25px; display: flex; align-items: center; justify-content: center; }
        .card:hover { border-color: var(--blue); }
        .card.selected-en { border-color: var(--blue); background: rgba(0, 243, 255, 0.2); box-shadow: 0 0 10px var(--blue); }
        .card.selected-tr { border-color: var(--pink); background: rgba(255, 0, 255, 0.2); box-shadow: 0 0 10px var(--pink); }
        .card.matched { visibility: hidden; opacity: 0; transform: scale(0); transition: 0.3s; }
        .card.error { border-color: red !important; animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .progress-info { margin-top: 15px; display: flex; justify-content: space-between; color: #888; font-size: 0.9rem; }
        #promo-msg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; }
    </style>
</head>
<body onload="initGame()">

<div id="promo-msg">
    <h1 style="font-size: 4rem; color: var(--green); margin: 0;">RÜTBE ATLANDI! 🎖️</h1>
    <p id="new-rank-text" style="font-size: 2rem; color: var(--gold);"></p>
</div>

<div class="game-board">
    <h1>PROJE MUSLUK</h1>
    <div class="rank-header"><div id="rank-name">YÜKLENİYOR...</div></div>
    <div class="match-grid"><div id="col-en" class="column"></div><div id="col-tr" class="column"></div></div>
    <div class="progress-info">
        <span>RÜTBE TAMAMLANAN: <span id="rank-prog" style="color:white">0/0</span></span>
        <span>SKOR: <span id="total-score" style="color:var(--green)">0</span></span>
    </div>
</div>

        {en:"Goal",tr:"Hedef"},{en:"Yarn",tr:"İplik"},{en:"Lace",tr:"Dantel"},{en:"Velvet",tr:"Kadife"},{en:"Jewel",tr:"Mücevher"},{en:"Silk",tr:"İpek"},{en:"Cotton",tr:"Pamuk"},{en:"Brave",tr:"Cesur"},{en:"Honest",tr:"Dürüst"},{en:"Calm",tr:"Sakin"},{en:"Quiet",tr:"Sessiz"},{en:"Funny",tr:"Komik"},{en:"Serious",tr:"Ciddi"},{en:"Shy",tr:"Utangaç"},{en:"Proud",tr:"Gururlu"},{en:"Soul",tr:"Ruh"},{en:"Region",tr:"Bölge"},{en:"Border",tr:"Sınır"},{en:"Island",tr:"Ada"},{en:"Desert",tr:"Çöl"},{en:"Forest",tr:"Orman"},{en:"Lake",tr:"Göl"},{en:"Ocean",tr:"Okyanus"},{en:"Coast",tr:"Sahil"},{en:"Coast",tr:"Kıyı"},{en:"Valley",tr:"Vadi"},{en:"Metal",tr:"Metal"},{en:"Iron",tr:"Demir"},{en:"Stone",tr:"Taş"},{en:"Rock",tr:"Kaya"},{en:"Leather",tr:"Deri"},{en:"Oil",tr:"Yağ"},{en:"Oil",tr:"Petrol"},{en:"Dust",tr:"Toz"},{en:"Sand",tr:"Kum"},{en:"Dark",tr:"Koyu"},{en:"Light",tr:"Açık"},{en:"Light",tr:"Işık"},{en:"Bright",tr:"Parlak"},{en:"Wait",tr:"Beklemek"},{en:"Try",tr:"Denemek"},{en:"Keep",tr:"Saklamak"},{en:"Hold",tr:"Tutmak"},{en:"Bring",tr:"Getirmek"},{en:"Government",tr:"Hükümet"},{en:"President",tr:"Başkan"},{en:"Minister",tr:"Bakan"},{en:"Vote",tr:"Oy vermek"},{en:"Election",tr:"Seçim"},{en:"Nation",tr:"Millet"},{en:"Freedom",tr:"Özgürlük"},{en:"Army",tr:"Ordu"},{en:"Soldier",tr:"Asker"},{en:"Sport",tr:"Spor"},{en:"Ball",tr:"Top"},{en:"Match",tr:"Maç"},{en:"Player",tr:"Oyuncu"},{en:"Coach",tr:"Antrenör"},{en:"Score",tr:"Skor"},{en:"Health",tr:"Sağlık"},{en:"Illness",tr:"Hastalık"},{en:"Disease",tr:"Hastalık"},{en:"Medicine",tr:"İlaç"},{en:"Nurse",tr:"Hemşire"},{en:"Wound",tr:"Yara"},{en:"Cure",tr:"Tedavi"},{en:"Operation",tr:"Ameliyat"},{en:"Tower",tr:"Kule"},{en:"Brick",tr:"Tuğla"},{en:"Fence",tr:"Çit"},{en:"Already",tr:"Zaten"},{en:"Yet",tr:"Henüz"},{en:"Still",tr:"Hala"},{en:"Since",tr:"Den beri"},{en:"Until",tr:"Kadar"},{en:"While",tr:"İken"},{en:"Seldom",tr:"Seyrek"},{en:"Rarely",tr:"Nadiren"},{en:"Income",tr:"Gelir"},{en:"Value",tr:"Değer"},{en:"Safe",tr:"Kasa"},{en: function speak(text) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US'; 
    utterance.rate = 0.9;
    window.speechSynthesis.speak(utterance);
}
let currentRankIdx = 0, activePool = [], waitList = [], selectedEn = null, selectedTr = null, score = 0;

function initGame() {
    activePool = [...RANKS[currentRankIdx].words];
    document.getElementById('rank-name').innerText = RANKS[currentRankIdx].name;
    updateUI(); nextTurn();
}

function nextTurn() {
    const colEn = document.getElementById('col-en'), colTr = document.getElementById('col-tr');
    colEn.innerHTML = ''; colTr.innerHTML = '';
    waitList.forEach(item => item.wait--);
    activePool.push(...waitList.filter(item => item.wait <= 0).map(item => item.word));
    waitList = waitList.filter(item => item.wait > 0);
    let pool = [...activePool];
    if(pool.length === 0 && waitList.length > 0) { pool = waitList.map(i => i.word); waitList = []; }
    if(pool.length === 0) { promote(); return; }
    let turnWords = pool.sort(() => Math.random() - 0.5).slice(0, 5);
    let sEn = [...turnWords].sort(() => Math.random() - 0.5), sTr = [...turnWords].sort(() => Math.random() - 0.5);
    sEn.forEach(w => colEn.appendChild(createCard(w.en, w.en, 'en')));
    sTr.forEach(w => colTr.appendChild(createCard(w.tr, w.en, 'tr')));
}

function createCard(t, id, type) {
    const d = document.createElement('div'); 
    d.className = 'card'; 
    d.innerText = t;
    d.onclick = () => {
        if(type === 'en') { 
            speak(t); // <--- SES KOMUTU BURAYA EKLENDİ
            if(selectedEn) selectedEn.el.classList.remove('selected-en'); 
            selectedEn = {el: d, id}; 
            d.classList.add('selected-en'); 
        }
        else { 
            if(selectedTr) selectedTr.el.classList.remove('selected-tr'); 
            selectedTr = {el: d, id}; 
            d.classList.add('selected-tr'); 
        }
        if(selectedEn && selectedTr) check();
    };
    return d;
}

function check() {
    if(selectedEn.id === selectedTr.id) {
        activePool = activePool.filter(w => w.en !== selectedEn.id);
        selectedEn.el.classList.add('matched'); selectedTr.el.classList.add('matched');
        score += 100; if(document.querySelectorAll('.card:not(.matched)').length === 0) setTimeout(nextTurn, 300);
    } else {
        let w = RANKS[currentRankIdx].words.find(w => w.en === selectedEn.id);
        if(w && !waitList.some(i => i.word.en === w.en)) { activePool = activePool.filter(x => x.en !== w.en); waitList.push({word: w, wait: 3}); }
        selectedEn.el.classList.add('error'); selectedTr.el.classList.add('error');
        setTimeout(() => { selectedEn.el.classList.remove('selected-en', 'error'); selectedTr.el.classList.remove('selected-tr', 'error'); }, 250);
    }
    selectedEn = null; selectedTr = null; updateUI();
}

function promote() {
    currentRankIdx++;
    if(currentRankIdx < RANKS.length) {
        const msg = document.getElementById('promo-msg');
        document.getElementById('new-rank-text').innerText = "YENİ GÖREV: " + RANKS[currentRankIdx].name;
        msg.style.display = 'flex'; setTimeout(() => { msg.style.display = 'none'; initGame(); }, 2000);
    } else { document.getElementById('rank-name').innerText = "ELMAS BAŞKOMUTAN 💎"; alert("ZAFER! TÜM SÖZCÜKLER FETHEDİLDİ!"); }
}

function updateUI() {
    document.getElementById('total-score').innerText = score;
    let total = RANKS[currentRankIdx].words.length, rem = activePool.length + waitList.length;
    document.getElementById('rank-prog').innerText = (total - rem) + "/" + total;
}
